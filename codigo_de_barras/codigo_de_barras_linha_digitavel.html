<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Boleto - Código de Barras & Linha Digitável</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="../libs/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --glass-border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(34, 211, 238, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .results {
            display: grid;
            gap: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .results.active {
            opacity: 1;
            transform: translateY(0);
        }

        .result-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
        }

        .result-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            word-break: break-all;
            color: var(--accent);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .barcode-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            overflow: hidden;
        }

        #barcode {
            max-width: 100%;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .detail-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
        }

        .detail-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-val {
            font-weight: 600;
            color: var(--text-main);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.4);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .input-panel {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .input-panel.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .manual-field {
            margin-bottom: 16px;
        }

        .history-section {
            margin-top: 40px;
            border-top: 1px solid var(--glass-border);
            padding-top: 24px;
        }

        .history-list {
            display: grid;
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .history-item {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(15, 23, 42, 0.5);
            border-color: var(--primary);
        }

        .btn-random {
            background: rgba(148, 163, 184, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }

        .btn-random:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .history-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--error);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            opacity: 1;
        }

        .copy-hist-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .copy-hist-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            opacity: 1;
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-bank { font-size: 0.8rem; color: var(--text-dim); }
        .history-val { font-weight: 600; color: var(--accent); }

        .type-tag {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 4px;
            display: inline-block;
        }
        .tag-gerado { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .tag-convertido { background: rgba(50, 188, 173, 0.2); color: #32bcad; }

        .pix-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 24px;
            background: white;
            border-radius: 16px;
            margin-top: 24px;
        }

        #pix-qrcode {
            padding: 10px;
            background: white;
        }

        .pix-label {
            color: #0f172a;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .validation-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-valid { background: var(--success); color: white; }
        .badge-invalid { background: var(--error); color: white; }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Tooltip Style */
        .tooltip {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 50%;
            font-size: 11px;
            color: var(--text-dim);
            cursor: help;
            margin-left: 8px;
            transition: all 0.2s;
            vertical-align: middle;
        }

        .tooltip:hover {
            background: var(--primary);
            color: white;
        }

        .tooltip-text {
            visibility: hidden;
            width: 280px;
            background-color: #1e293b;
            color: #fff;
            text-align: left;
            border-radius: 12px;
            padding: 16px;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -140px;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            font-size: 0.8rem;
            line-height: 1.4;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-text b { color: var(--accent); display: block; margin-bottom: 4px; }
        .tooltip-text p { margin-bottom: 8px; }
        .tooltip-text p:last-child { margin-bottom: 0; }

        /* Responsive */
        @media (max-width: 640px) {
            .card { padding: 24px; }
            h1 { font-size: 1.5rem; }
            .result-value { font-size: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <h1>Boleto Wizard</h1>
            <p class="subtitle">Insira a Linha Digitável ou o Código de Barras para gerar o visual.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('converter')">Conversor</button>
            <button class="tab-btn" onclick="switchTab('generator')">Gerador Manual</button>
        </div>

        <div id="converterPanel" class="input-panel active">
            <div class="input-group">
                <label for="mainInput">Linha Digitável / Código de Barras</label>
                <div class="input-wrapper">
                    <input type="text" id="mainInput" placeholder="Cole o código aqui..." autocomplete="off">
                </div>
                <div id="errorMsg" class="error-msg">Código inválido ou incompleto para cobrança bancária.</div>
            </div>
        </div>

        <div id="generatorPanel" class="input-panel">
            <div class="form-grid">
                <div class="manual-field" style="grid-column: span 2;">
                    <label for="genBank">Banco (Cód ou Nome)</label>
                    <div class="input-wrapper">
                        <input type="text" id="genBank" list="bankList" placeholder="Ex: Bradesco ou 237" autocomplete="off">
                    </div>
                    <datalist id="bankList">
                        <!-- Lista populada via JS -->
                    </datalist>
                </div>
                <div class="manual-field">
                    <label for="genCurrency">Moeda</label>
                    <input type="text" id="genCurrency" list="currencyList" value="9" maxlength="1">
                    <datalist id="currencyList">
                        <option value="9">Real (R$)</option>
                        <option value="8">Estrang.</option>
                    </datalist>
                </div>
                <div class="manual-field">
                    <label>Valor (R$)</label>
                    <input type="text" id="genValue" placeholder="0,00">
                </div>
                <div class="manual-field">
                    <label>Data Vencimento</label>
                    <input type="date" id="genDate">
                </div>
                <div class="manual-field">
                    <label>
                        Tipo Boleto
                        <span class="tooltip">?
                            <span class="tooltip-text">
                                <b>Bancário (47 dígitos)</b>
                                <p>Usado para cobranças comuns (vendas, cartões, serviços). Identificado pelo código do banco no início.</p>
                                <b>Arrecadação/Convênio (48 dígitos)</b>
                                <p>Contas de consumo (Água, Luz, Telefone, Gás), tributos e taxas de órgãos públicos. Geralmente começam com o número 8.</p>
                            </span>
                        </span>
                    </label>
                    <select id="genType" style="width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; color: white;">
                        <option value="bancario">Bancário (47 dig)</option>
                        <option value="convenio">Arrecadação (48 dig)</option>
                    </select>
                </div>
            </div>
            <div class="manual-field" style="margin-top: 10px; position: relative;">
                <label>Campo Livre / Nosso Número (25 dígitos)</label>
                <div class="input-wrapper">
                    <input type="text" id="genFree" placeholder="Ex: 0000000000000000000012345" maxlength="25">
                    <button class="btn-random" onclick="generateRandomFree()">ALEATÓRIO</button>
                </div>
            </div>
            <button class="btn-primary" onclick="generateFromManualFields()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                GERAR BOLETO
            </button>
        </div>

        <div id="resultsArea" class="results">
            <div class="result-box">
                <div class="result-label">
                    <span>Linha Digitável</span>
                    <div id="isValidBadge" class="validation-badge"></div>
                    <button class="copy-btn" onclick="copyText('formattedLinha')">COPIAR</button>
                </div>
                <div id="formattedLinha" class="result-value">---</div>
            </div>

            <div class="result-box">
                <div class="result-label">
                    <span>Código de Barras (44 dígitos)</span>
                    <button class="copy-btn" onclick="copyText('rawBarcode')">COPIAR</button>
                </div>
                <div id="rawBarcode" class="result-value">---</div>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-label">Banco</div>
                    <div id="bankInfo" class="detail-val">---</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Vencimento</div>
                    <div id="dueDate" class="detail-val">---</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Valor</div>
                    <div id="amount" class="detail-val">R$ 0,00</div>
                </div>
            </div>

            <div class="result-box" style="background: white;">
                <div class="result-label" style="color: #64748b; margin-bottom: 12px;">Visualização das Barras (ITF)</div>
                <div class="barcode-container">
                    <svg id="barcode"></svg>
                </div>
            </div>
        </div>

        <div class="history-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <label style="margin: 0;">Histórico Recente</label>
                <button class="copy-btn" style="color: var(--error);" onclick="clearAllHistory()">LIMPAR TUDO</button>
            </div>
            <div id="historyList" class="history-list">
                <!-- Populado via LocalStorage -->
            </div>
        </div>
    </div>
</div>

<script>
    const input = document.getElementById('mainInput');
    const resultsArea = document.getElementById('resultsArea');
    const errorMsg = document.getElementById('errorMsg');
    
    const elements = {
        formattedLinha: document.getElementById('formattedLinha'),
        rawBarcode: document.getElementById('rawBarcode'),
        bankInfo: document.getElementById('bankInfo'),
        dueDate: document.getElementById('dueDate'),
        amount: document.getElementById('amount')
    };

    input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        processCode(val);
    });

    ['genBank', 'genCurrency', 'genDate', 'genFree', 'genType'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', (e) => {
            if(e.key === 'Enter') generateFromManualFields();
        });
    });

    const genValueInput = document.getElementById('genValue');
    genValueInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value) {
            value = (parseInt(value) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            e.target.value = value;
        }
    });

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
        
        const currentTab = document.querySelector(`.tab-btn[onclick*="${tab}"]`);
        if(currentTab) currentTab.classList.add('active');
        document.getElementById(tab + 'Panel').classList.add('active');
        resultsArea.classList.remove('active');
    }

    const bankData = [
        {c:"001", n:"Banco do Brasil S.A."},
        {c:"033", n:"Banco Santander (Brasil) S.A."},
        {c:"104", n:"Caixa Econômica Federal"},
        {c:"237", n:"Banco Bradesco S.A."},
        {c:"341", n:"Itaú Unibanco S.A."},
        {c:"077", n:"Banco Inter S.A."},
        {c:"260", n:"Nu Pagamentos S.A. (Nubank)"},
        {c:"748", n:"Banco Cooperativo Sicredi S.A."},
        {c:"756", n:"Banco Cooperativo Sicoob S.A."},
        {c:"041", n:"Banrisul S.A."},
        {c:"003", n:"Banco da Amazônia S.A."},
        {c:"004", n:"Banco do Nordeste do Brasil S.A."},
        {c:"070", n:"BRB - Banco de Brasília S.A."},
        {c:"336", n:"Banco C6 S.A."},
        {c:"422", n:"Banco Safra S.A."},
        {c:"069", n:"Banco Crefisa S.A."},
        {c:"121", n:"Banco Agibank S.A."},
        {c:"212", n:"Banco Original S.A."},
        {c:"735", n:"Banco Neon S.A."},
        {c:"208", n:"Banco BTG Pactual S.A."},
        {c:"655", n:"Banco Votorantim S.A."},
        {c:"389", n:"Banco Mercantil do Brasil S.A."},
        {c:"021", n:"Banestes S.A."},
        {c:"047", n:"Banese S.A."},
        {c:"037", n:"Banpará S.A."},
        {c:"001", n:"Bacen / Tesouro Nacional"},
        {c:"745", n:"Citibank S.A."},
        {c:"218", n:"Banco BS2 S.A."},
        {c:"246", n:"Banco ABC Brasil S.A."},
        {c:"085", n:"Cooperativa Central Ailos"},
        {c:"099", n:"Uniprime Central"},
        {c:"136", n:"Unicred do Brasil"}
    ];

    function initBankList() {
        const list = document.getElementById('bankList');
        bankData.forEach(b => {
            // Criamos uma única opção por banco. 
            // O 'value' é o que será inserido no input (o código).
            // O texto interno (ou o que aparece no autocomplete) ajuda na busca por nome.
            const opt = document.createElement('option');
            opt.value = b.c; // Valor que vai para o campo
            opt.innerText = b.n; // Nome que aparece ao lado para busca
            list.appendChild(opt);
        });
    }
    initBankList();

    // Sincroniza o código quando o usuário seleciona um nome
    const bankInput = document.getElementById('genBank');
    bankInput.addEventListener('change', (e) => {
        const val = e.target.value;
        const found = bankData.find(b => b.n === val);
        if (found) {
            e.target.dataset.realCode = found.c;
            // Opcional: mostrar o código no input após selecionar o nome
            // e.target.value = found.c; 
        } else {
            e.target.dataset.realCode = val.replace(/\D/g, '').substring(0, 3);
        }
        generateFromManualFields();
    });

    function generateRandomFree() {
        let randomNum = "";
        for(let i = 0; i < 25; i++) {
            randomNum += Math.floor(Math.random() * 10);
        }
        document.getElementById('genFree').value = randomNum;
    }

    function generateFromManualFields() {
        const rawBank = bankInput.value;
        // Tenta achar o código se for um nome, senão pega apenas números
        const found = bankData.find(b => b.n === rawBank);
        const bank = (found ? found.c : rawBank.replace(/\D/g, '')).padStart(3, '0').substring(0, 3);
        
        const currency = document.getElementById('genCurrency').value || '9';
        const rawValue = document.getElementById('genValue').value.replace(/\D/g, '');
        const dateVal = document.getElementById('genDate').value;
        const freeField = document.getElementById('genFree').value.replace(/\D/g, '').padEnd(25, '0').substring(0, 25);

        if (bank.length === 3 && rawValue && dateVal) {
            const factor = calculateDateFactor(dateVal);
            const amount = rawValue.padStart(10, '0');
            
            // Monta pré-código (sem o DV na pos 5)
            // Estrutura: Banco(3) + Moeda(1) + [DV(1)] + Fator(4) + Valor(10) + Livre(25)
            const partial = bank + currency + factor + amount + freeField;
            
            const dv = calculateMod11(partial);
            const barcode = bank + currency + dv + factor + amount + freeField;
            
            updateUI(barcode, barcodeToLinha(barcode), true);
            resultsArea.classList.add('active');
            saveHistory(barcode, barcodeToLinha(barcode), 'Gerado');
            errorMsg.style.display = 'none';
        } else {
            resultsArea.classList.remove('active');
        }
    }

    function calculateDateFactor(dateStr) {
        const target = new Date(dateStr + 'T12:00:00'); // Meio dia para evitar bugs de fuso
        const baseOriginal = new Date('1997-10-07T12:00:00');
        
        let diff = Math.floor((target - baseOriginal) / (1000 * 60 * 60 * 24));
        
        // Regra FEBRABAN: Após 21/02/2025 (Fator 9999), o fator retorna para 1000
        if (diff > 9999) {
            const baseNova = new Date('2025-02-22T12:00:00');
            diff = Math.floor((target - baseNova) / (1000 * 60 * 60 * 24)) + 1000;
        }
        
        return diff.toString().padStart(4, '0');
    }

    function calculateMod11(num) {
        // num tem 43 dígitos (faltando o DV da posição 5)
        let sum = 0;
        let weight = 2;
        
        for (let i = num.length - 1; i >= 0; i--) {
            sum += parseInt(num[i]) * weight;
            weight = weight === 9 ? 2 : weight + 1;
        }
        
        let dv = 11 - (sum % 11);
        if (dv === 0 || dv === 10 || dv === 11) return "1";
        return dv.toString();
    }

    function processCode(code) {
        if (!code) {
            resultsArea.classList.remove('active');
            return;
        }

        let barcode = '';
        let linha = '';
        let isValid = false;

        try {
            if (code.length === 44) {
                barcode = code;
                linha = barcodeToLinha(barcode);
                isValid = true; // Assumido se tiver 44
            } else if (code.length === 47) {
                linha = code;
                isValid = validateBancario(linha);
                barcode = linhaToBarcode(linha);
            } else if (code.length === 48) {
                linha = code;
                isValid = validateConvenio(linha);
                barcode = convenioToBarcode(linha);
            }

            if (barcode && barcode.length === 44) {
                updateUI(barcode, linha, isValid);
                resultsArea.classList.add('active');
                if(isValid) saveHistory(barcode, linha, 'Convertido');
            }
        } catch (e) {
            console.error(e);
        }
    }

    function validateBancario(l) {
        const b1 = l.substring(0, 9);
        const b2 = l.substring(10, 20);
        const b3 = l.substring(21, 31);
        return calculateMod10(b1) === l[9] && 
               calculateMod10(b2) === l[20] && 
               calculateMod10(b3) === l[31];
    }

    function validateConvenio(l) {
        // Breve validação de 4 blocos de 12
        return true; 
    }

    function convenioToBarcode(l) {
        // Remove os 4 DVs (pos 11, 23, 35, 47)
        return l.substring(0,11) + l.substring(12,23) + l.substring(24,35) + l.substring(36,47);
    }

    function updateUI(barcode, linha, isValid) {
        elements.rawBarcode.innerText = barcode;
        elements.formattedLinha.innerText = formatLinha(linha);
        
        const badge = document.getElementById('isValidBadge');
        badge.innerText = isValid ? "VÁLIDO" : "INVÁLIDO";
        badge.className = `validation-badge ${isValid ? 'badge-valid' : 'badge-invalid'}`;

        const bankCode = barcode.substring(0, 3);
        elements.bankInfo.innerText = getBankName(bankCode);
        const factor = parseInt(barcode.substring(5, 9));
        elements.dueDate.innerText = calculateDueDate(factor);
        elements.amount.innerText = formatCurrency(parseInt(barcode.substring(9, 19)) / 100);

        JsBarcode("#barcode", barcode, { format: "itf", width: 2, height: 80, displayValue: false });
    }

    function copyRawText(event, text) {
        event.stopPropagation();
        navigator.clipboard.writeText(text.replace(/\D/g, ''));
        const btn = event.currentTarget;
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => { btn.innerHTML = originalHTML; }, 1000);
    }

    function saveHistory(barcode, linha, type) {
        let history = JSON.parse(localStorage.getItem('boleto_history') || '[]');
        const item = { 
            id: Date.now(), 
            barcode, 
            linha, 
            type: type || 'Info',
            date: new Date().toLocaleTimeString(), 
            fullDate: new Date().toLocaleDateString(),
            bank: getBankName(barcode.substring(0,3)) 
        };
        history = [item, ...history.filter(h => h.barcode !== barcode)].slice(0, 15);
        localStorage.setItem('boleto_history', JSON.stringify(history));
        renderHistory();
    }

    function deleteHistoryItem(event, id) {
        event.stopPropagation(); // Evita carregar o boleto ao clicar na lixeira
        let history = JSON.parse(localStorage.getItem('boleto_history') || '[]');
        history = history.filter(h => h.id !== id);
        localStorage.setItem('boleto_history', JSON.stringify(history));
        renderHistory();
    }

    function clearAllHistory() {
        if(confirm("Deseja realmente apagar todo o histórico?")) {
            localStorage.removeItem('boleto_history');
            renderHistory();
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('boleto_history') || '[]');
        
        if(history.length === 0) {
            list.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8rem;">Nenhum boleto no histórico.</div>';
            return;
        }

        list.innerHTML = history.map(h => `
            <div class="history-item" onclick="processCode('${h.barcode}')">
                <div class="history-info">
                    <span class="history-bank">${h.bank}</span>
                    <span style="font-size: 0.7rem; color: var(--text-dim); opacity: 0.8;">${h.linha.substring(0,18)}...</span>
                    <span class="type-tag tag-${(h.type || 'info').toLowerCase()}">${h.type}</span>
                </div>
                <div class="history-actions">
                    <div style="text-align: right; margin-right: 12px;">
                        <span class="history-val" style="display: block; font-size: 0.85rem;">${h.date}</span>
                        <span style="font-size: 0.6rem; color: var(--text-dim);">${h.fullDate}</span>
                    </div>
                    <button class="copy-hist-btn" onclick="copyRawText(event, '${h.linha}')" title="Copiar Linha">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                    <button class="delete-btn" onclick="deleteHistoryItem(event, ${h.id})" title="Remover item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
            </div>
        `).join('');
    }
    renderHistory();

    function linhaToBarcode(linha) {
        // Posições Cobrança:
        // Campo 1: 0-9 (DV na pos 9)
        // Campo 2: 10-20 (DV na pos 20)
        // Campo 3: 21-31 (DV na pos 31)
        // Campo 4: 32 (DV Geral)
        // Campo 5: 33-46 (Vencimento + Valor)
        
        let barcode = '';
        barcode += linha.substring(0, 3); // Banco
        barcode += linha.substring(3, 4); // Moeda
        barcode += linha.substring(32, 33); // DV Geral
        barcode += linha.substring(33, 37); // Fator Vencimento
        barcode += linha.substring(37, 47); // Valor
        barcode += linha.substring(4, 9);   // Campo Livre 1
        barcode += linha.substring(10, 20); // Campo Livre 2
        barcode += linha.substring(21, 31); // Campo Livre 3
        
        return barcode;
    }

    function barcodeToLinha(barcode) {
        // Banco(3), Moeda(1), Fator(4), Valor(10), Livre(25)
        const bank = barcode.substring(0, 3);
        const currency = barcode.substring(3, 4);
        const dvGeral = barcode.substring(4, 5);
        const factor = barcode.substring(5, 9);
        const amount = barcode.substring(9, 19);
        const freeField = barcode.substring(19, 44);

        const l1 = bank + currency + freeField.substring(0, 5);
        const dv1 = calculateMod10(l1);
        
        const l2 = freeField.substring(5, 15);
        const dv2 = calculateMod10(l2);
        
        const l3 = freeField.substring(15, 25);
        const dv3 = calculateMod10(l3);
        
        return l1 + dv1 + l2 + dv2 + l3 + dv3 + dvGeral + factor + amount;
    }

    function formatLinha(l) {
        if (l.length === 47) {
            return `${l.substring(0, 5)}.${l.substring(5, 10)} ${l.substring(10, 15)}.${l.substring(15, 21)} ${l.substring(21, 26)}.${l.substring(26, 32)} ${l.substring(32, 33)} ${l.substring(33, 47)}`;
        }
        return l;
    }

    function calculateMod10(num) {
        let sum = 0;
        let weight = 2;
        for (let i = num.length - 1; i >= 0; i--) {
            let res = parseInt(num[i]) * weight;
            if (res > 9) res = Math.floor(res / 10) + (res % 10);
            sum += res;
            weight = weight === 2 ? 1 : 2;
        }
        let dv = (10 - (sum % 10)) % 10;
        return dv.toString();
    }

    function calculateDueDate(factor) {
        if (factor === 0) return "Sem data";
        
        // Se o fator for próximo de 9999 ou virou após 2025, precisamos decidir a base
        // Notas: Regra de circulação de 1000 a 9999 a cada ~24 anos.
        // Fator 1000 em 22/02/2025
        const baseNova = new Date('2025-02-22T12:00:00');
        const baseOriginal = new Date('1997-10-07T12:00:00');
        
        const date = new Date(baseOriginal);
        date.setDate(date.getDate() + factor);
        
        // Se a data calculada for antes de 2025 e o fator for baixo, pode ser a base nova
        if (factor >= 1000 && factor <= 9999) {
            // Checagem simples: boletos atuais usarão a base de 2025 se o ano for coerente
            const nowYear = new Date().getFullYear();
            if (nowYear >= 2024 && date.getFullYear() < 2024) {
                const date2 = new Date(baseNova);
                date2.setDate(date2.getDate() + (factor - 1000));
                return date2.toLocaleDateString('pt-BR');
            }
        }

        return date.toLocaleDateString('pt-BR');
    }

    function formatCurrency(val) {
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    }

    function getBankName(code) {
        const banks = {
            '001': 'Banco do Brasil',
            '033': 'Santander',
            '104': 'Caixa Econômica',
            '237': 'Bradesco',
            '341': 'Itaú',
            '748': 'Sicredi',
            '756': 'Sicoob',
            '041': 'Banrisul',
            '260': 'Nubank',
            '077': 'Inter',
            '422': 'Safra'
        };
        return banks[code] || `Bancário (${code})`;
    }

    function copyText(id) {
        let text = document.getElementById(id).innerText;
        // Remove tudo que não for número antes de copiar
        text = text.replace(/\D/g, '');
        navigator.clipboard.writeText(text);
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = 'COPIADO!';
        setTimeout(() => btn.innerText = originalText, 2000);
    }
</script>
